# =============================================================================
# KatanA Desktop — Release CD
# =============================================================================
# Builds the macOS .app bundle and .dmg installer, then creates a GitHub Release
# with the artifacts attached.
#
# Triggers:
#   - Push of a version tag (v*)
#   - Manual dispatch (workflow_dispatch)
#
# Security:
#   - Only the repository owner can trigger this workflow
#   - Fork PRs will NOT trigger this workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    # Only allow the repository owner to run this workflow
    if: github.actor == 'HiroyukiFuruno'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-bundle
        run: command -v cargo-bundle || cargo install cargo-bundle

      - name: Install create-dmg
        run: brew install create-dmg


      - name: Clean stale DMG files
        run: rm -f target/release/KatanA-Desktop-*.dmg

      - name: Build .app bundle
        run: make package-mac

      - name: Ad-hoc code sign
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Build .dmg installer
        run: make dmg

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          awk "/^## \[${VERSION_NUM}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > RELEASE_NOTES.md
          echo "--- Release notes for ${VERSION} ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: KatanA Desktop ${{ steps.tag.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            target/release/KatanA-Desktop-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: success()
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Validate token
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. Please configure it in repository settings."
            exit 1
          fi

          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          DMG=$(find target/release -name "KatanA-Desktop-*.dmg" -maxdepth 1 | sort -V | tail -1)
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')

          echo "Version: $VERSION_NUM"
          echo "SHA256:  $SHA256"

          # Fetch current Cask file from homebrew-katana repo
          CASK_PATH="Casks/katana-desktop.rb"
          CURRENT=$(curl -s -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            "https://api.github.com/repos/HiroyukiFuruno/homebrew-katana/contents/$CASK_PATH")

          # Validate API response
          if echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if 'sha' in d else 1)" 2>/dev/null; then
            FILE_SHA=$(echo "$CURRENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          else
            echo "::error::Failed to fetch Cask file from homebrew-katana. API response:"
            echo "$CURRENT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','unknown error'))" 2>/dev/null || echo "$CURRENT"
            exit 1
          fi

          # Generate updated Cask content
          CASK_CONTENT=$(cat <<'CASK_EOF'
          cask "katana-desktop" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/HiroyukiFuruno/katana/releases/download/v#{version}/KatanA-Desktop-#{version}.dmg"
            name "KatanA Desktop"
            desc "Lightweight Markdown viewer with live preview, Mermaid diagrams, and syntax highlighting"
            homepage "https://github.com/HiroyukiFuruno/katana"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :ventura"

            app "KatanA Desktop.app"

            # Remove quarantine attribute (required for ad-hoc signed apps without Apple notarization)
            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/KatanA Desktop.app"]
            end

            zap trash: [
              "~/Library/Preferences/com.katana.desktop.plist",
              "~/Library/Caches/com.katana.desktop",
            ]
          end
          CASK_EOF
          )

          # Replace placeholders
          CASK_CONTENT=$(echo "$CASK_CONTENT" | sed "s/VERSION_PLACEHOLDER/$VERSION_NUM/g" | sed "s/SHA256_PLACEHOLDER/$SHA256/g")

          # Remove leading whitespace (heredoc indentation)
          CASK_CONTENT=$(echo "$CASK_CONTENT" | sed 's/^          //')

          # Base64 encode for GitHub API
          ENCODED=$(echo "$CASK_CONTENT" | base64)

          # Update via GitHub API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/HiroyukiFuruno/homebrew-katana/contents/$CASK_PATH" \
            -d "{
              \"message\": \"chore: update katana-desktop to $VERSION_NUM\",
              \"content\": \"$ENCODED\",
              \"sha\": \"$FILE_SHA\"
            }")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Updated:', d.get('content',{}).get('html_url','unknown'))"
          else
            echo "::error::Failed to update Cask file (HTTP $HTTP_CODE):"
            echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('message','unknown error'))" 2>/dev/null || echo "$BODY"
            exit 1
          fi
