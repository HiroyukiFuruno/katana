# =============================================================================
# KatanA Desktop — Release CD
# =============================================================================
# Builds the macOS .app bundle and .dmg installer, then creates a GitHub Release
# with the artifacts attached.
#
# Triggers:
#   - Push of a version tag (v*)
#   - Manual dispatch (workflow_dispatch)
#
# Security:
#   - Only the repository owner can trigger this workflow
#   - Fork PRs will NOT trigger this workflow
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    # Only allow the repository owner to run this workflow
    if: github.actor == 'HiroyukiFuruno'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-bundle
        run: command -v cargo-bundle || cargo install cargo-bundle

      - name: Install create-dmg
        run: brew install create-dmg


      - name: Clean stale DMG files
        run: rm -f target/release/KatanA-Desktop-*.dmg

      - name: Build .app bundle
        run: make package-mac

      - name: Ad-hoc code sign
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          echo "Signing: $APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Build .dmg installer
        run: make dmg

      - name: Extract release notes from CHANGELOG.md
        run: |
          scripts/release/extract-notes.sh "${{ steps.tag.outputs.version }}" > RELEASE_NOTES.md
          echo "--- Release notes for ${{ steps.tag.outputs.version }} ---"
          cat RELEASE_NOTES.md

      - name: Generate Checksums
        run: |
          cd target/release
          shasum -a 256 KatanA-Desktop-*.dmg > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: KatanA Desktop ${{ steps.tag.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            target/release/KatanA-Desktop-*.dmg
            target/release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        if: success()
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          DMG=$(find target/release -name "KatanA-Desktop-*.dmg" -maxdepth 1 | sort -V | tail -1)
          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          DMG_NAME=$(basename "$DMG")
          scripts/release/update-homebrew.sh "${{ steps.tag.outputs.version }}" "$SHA256" "$DMG_NAME"
