# =============================================================================
# KatanA Desktop — Release CD
# =============================================================================
# Builds the macOS .app bundle and .dmg installer, then creates a GitHub Release
# with the artifacts attached.
#
# Triggers:
#   - Push of a version tag (v*)
#   - Manual dispatch (workflow_dispatch)
#
# Security:
#   - Only the repository owner can trigger this workflow
#   - Fork PRs will NOT trigger this workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.0.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    # Only allow the repository owner to run this workflow
    if: github.actor == 'HiroyukiFuruno'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Determine version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Cargo registry & build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-bundle
        run: command -v cargo-bundle || cargo install cargo-bundle

      - name: Install create-dmg
        run: brew install create-dmg


      - name: Build .app bundle
        run: make package-mac

      - name: Ad-hoc code sign .app
        run: |
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          echo "Signing: $APP_PATH"

          # 1. Remove quarantine attributes before signing
          xattr -cr "$APP_PATH"

          # 2. Ad-hoc codesign with hardened runtime (no Apple Developer ID needed)
          codesign --force --sign - \
            --options runtime \
            --timestamp=none \
            "$APP_PATH"

          # 3. Verify signature
          codesign --verify --verbose "$APP_PATH"

          # 4. Gatekeeper assessment (informational; ad-hoc won't pass strict check)
          spctl --assess --verbose "$APP_PATH" || true

      - name: Build .dmg installer
        env:
          # Extract version from Cargo.toml
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          VERSION_NUM="${VERSION#v}"
          APP_PATH=$(find target/release/bundle/osx -name "*.app" -maxdepth 1 | head -1)
          DMG_OUT="target/release/KatanA-Desktop-${VERSION_NUM}.dmg"
          rm -f "$DMG_OUT"
          # Build DMG directly from signed app (skip make dmg to avoid re-running package-mac)
          create-dmg \
            --volname "KatanA Desktop ${VERSION_NUM}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "KatanA Desktop.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "$DMG_OUT" \
            "$APP_PATH"

      - name: Ad-hoc sign .dmg
        run: |
          DMG=$(find target/release -name "KatanA-Desktop-*.dmg" -maxdepth 1 | sort -V | tail -1)
          echo "Signing DMG: $DMG"
          codesign --force --sign - "$DMG"
          codesign --verify --verbose "$DMG"

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          awk "/^## \[${VERSION_NUM}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md > RELEASE_NOTES.md
          echo "--- Release notes for ${VERSION} ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: KatanA Desktop ${{ steps.tag.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            target/release/KatanA-Desktop-*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
